services:
  postgres:
    image: postgres:15-alpine
    container_name: auralys-postgres
    environment:
      POSTGRES_DB: auralys
      POSTGRES_USER: auralys
      POSTGRES_PASSWORD: auralys
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - auralys_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auralys -d auralys"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: auralys-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - auralys_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/collections || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  auralys_postgres_data:
  auralys_qdrant_data:
